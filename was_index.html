CSV-DRIVEN PAGES — HOW THEY WORK
--------------------------------------------------------------------------------

1. ARTICLES PAGE (articles.html + articles-data.csv)
   articles-data.csv columns: order, year, title, publication, description, file
   - 15 entries; sorted by "order" column (numeric, 1–15). order "x" or "X" skips the row.
   - "file" column holds relative path to PDF (e.g. articles/HBR Gnarliest Challenges.pdf).
     Entries with no file get a "—" dash instead of a "View" link.
   - JavaScript in articles.html fetches articles-data.csv on page load, parses it with a
     custom CSV parser (handles quoted fields), then renders .article-row <li> elements into
     #article-list. Shows "Loading…" until fetch resolves.
   - Rendered row: [View/—] [year] [title in navy] [publication in italic muted] [description]

2. ARCHIVE PAGE (the-archive.html + library-data.csv; the-library.html redirects)
   library-data.csv columns: category, order, title, co_authors, year, journal, description, file
   - Entries across 8 active categories:
       papers            — Academic papers; year + journal as metadata
       smr               — Special Issue SMR (Strategic Management Review); year + journal as metadata
       cases             — Teaching cases
       books             — Book excerpts (GSBS, Crux)
       blogs             — StrategyLand Blog posts
       panel_of_experts  — Panel of Experts PDFs
       tech_notes        — Technical notes (descriptions in journal column for subtitle)
       data              — Strategy-Structure database PDF + CSV
   - "file" column holds relative path to PDF (or CSV for the data export).
   - JavaScript fetches library-data.csv once on page load, stores in libraryData array.
   - order "x" or "X" skips a row. substack.csv: add optional "order" column; x skips a row.
     Category links stay disabled until the CSV has loaded (avoids empty lists if you click
     too soon). Then renderList(filterName) filters by category, sorts by "order" then
     title, and renders a simple list into #lib-list.
   - Default state after load: "Select a category above to browse the archive."
   - INACTIVE CATEGORIES (shown as plain text, no data yet):
       Notes | Bibliography
     These appear in a separate .lib-coming row below the active filters.
