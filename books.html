<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Books — Richard Rumelt</title>
  <meta name="description" content="Books by Richard Rumelt, including Good Strategy Bad Strategy and The Crux, with excerpts and related materials." />
  <link rel="stylesheet" href="https://use.typekit.net/lhk6pvq.css">
  <link rel="stylesheet" href="common.css">
  <link rel="canonical" href="https://www.richardrumelt.com/books.html" />
  <style>
    /* Page-specific styles */
    .page-heading { padding-bottom: 2.5rem; }

    .book-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }

    .book-card {
      overflow: hidden;
      transition: transform 0.2s;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }
    .book-card:hover { transform: translateY(-2px); }

    .book-cover { width: 100%; aspect-ratio: 2/3; overflow: hidden; background-color: var(--color-bg-subtle); }
    .book-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .book-info { padding: 0.75rem 0 0; flex: 1; display: flex; flex-direction: column; gap: 0.3rem; }
    .book-title { font-family: var(--font-main); font-size: 1em; font-weight: 700; color: var(--color-navy); line-height: 1.3; }
    .book-subtitle { font-family: var(--font-main); font-size: 1em; color: var(--color-muted); font-style: italic; line-height: 1.3; }
    .book-year { font-family: var(--font-main); font-size: 1em; color: var(--color-muted); margin-top: 0.25rem; }

    @media (max-width: 800px) { .book-grid { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
  <header class="site-header">
  <p class="site-banner">Richard Rumelt</p>
  <nav class="nav-top" aria-label="Primary">
    <a href="about.html">About</a>
    <a href="advisory.html">Services</a>
    <a href="books.html" class="active">Portfolio</a>
  </nav>
  <nav class="nav-sub" aria-label="Portfolio">
    <a href="books.html" class="active">Books</a>
    <a href="articles.html">Articles</a>
    <a href="substack.html">Substack</a>
    <a href="the-archive.html">The Archive</a>
  </nav>
  </header>

  <div class="page-heading">
    <h1>Books</h1>
    <p>Books on strategy, leadership, and the discipline of clear thinking.</p>
    <div class="divider"></div>
  </div>

  <main>
    <p id="books-md-status" style="color: var(--color-muted); font-style: italic;">Loading…</p>
    <div id="books-md-root" hidden></div>
  </main>

  <footer>
    <p>© 2026 Richard Rumelt. All rights reserved.</p>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="js/markdown-page.js"></script>
  <script>
    RumeltMD.load({
      mdPath: 'content/books.md',
      root: '#books-md-root',
      status: '#books-md-status',
      heading: { title: '.page-heading h1', tagline: '.page-heading > p' }
    });
  </script>
</body>
</html>
