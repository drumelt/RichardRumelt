<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Rumelt Advisory Inc. — Richard Rumelt</title>
        <meta name="description" content="Strategic advisory by Richard Rumelt, author of Good Strategy Bad Strategy and The Crux, focused on diagnosing critical challenges and designing coherent action." />
        <link rel="stylesheet" href="https://use.typekit.net/lhk6pvq.css">
        <link rel="stylesheet" href="common.css">
        <link rel="canonical" href="https://www.richardrumelt.com/index.html" />
        <style>
            /* Page-specific: match site main width/padding from common.css (no narrow column) */
            .section-heading {
                font-family: var(--font-main);
                font-size: 1em;
                font-weight: 700;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: var(--color-navy);
                text-align: center;
                margin: 2.5rem 0 1.25rem;
            }
            main > .section-heading:first-child {
                margin-top: 0;
            }
            .prose p { line-height: 1.75; margin-bottom: 1.25rem; }
            .prose p:last-child { margin-bottom: 0; }
            .prose strong { font-weight: 700; color: var(--color-navy); }
            .prose a { color: var(--color-accent); text-decoration: underline; }
            .prose em { font-style: italic; }
            /* Markdown body (content/advisory.md) */
            .advisory-md h2 {
                font-family: var(--font-main);
                font-size: 1em;
                font-weight: 700;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: var(--color-navy);
                text-align: center;
                margin: 2.5rem 0 1.25rem;
            }
            .advisory-md h2:first-child { margin-top: 0; }
            .advisory-md p {
                line-height: 1.75;
                margin-bottom: 1.25rem;
            }
            .advisory-md strong { font-weight: 700; color: var(--color-navy); }
            .advisory-md a { color: var(--color-accent); text-decoration: underline; }
            .advisory-md em { font-style: italic; }
            .advisory-md blockquote {
                font-family: var(--font-main);
                font-size: 1em;
                font-style: italic;
                font-weight: 600;
                color: var(--color-accent);
                text-align: center;
                margin: 1.5rem auto;
                max-width: 90%;
                line-height: 1.5;
                border: none;
                padding: 0;
            }
            #advisory-md-status { color: var(--color-muted); font-style: italic; }
            .pull-quote {
                font-family: var(--font-main);
                font-size: 1em;
                font-style: italic;
                font-weight: 600;
                color: var(--color-accent);
                text-align: center;
                margin: 1.5rem auto;
                max-width: 90%;
                line-height: 1.5;
            }
            .attribution {
                font-family: var(--font-main);
                font-size: 1em;
                font-style: italic;
                font-weight: 600;
                color: var(--color-navy);
                text-align: center;
                margin: 1.25rem 0 0.5rem;
            }
            .citation {
                flex: 1;
                font-family: var(--font-main);
                font-size: 1em;
                font-style: italic;
                color: var(--color-accent);
                margin-bottom: 0.4rem;
                padding-left: 1rem;
            }
            .citation span { font-style: normal; font-weight: 600; }
            .advisory-citation-row {
                display: flex;
                gap: 2rem;
                margin: 1.25rem 0;
            }
            .section-rule {
                width: 160px;
                height: 1px;
                background-color: var(--color-accent);
                margin: 2rem auto;
                opacity: 0.4;
            }
            .img-center { margin: 1.5rem auto; max-width: 320px; width: 100%; }
            .advisory-md .img-center-advisor { max-width: 720px; }
            .img-center img { width: 100%; border-radius: 2px; }
            @media (min-width: 900px) {
                .advisory-md .img-center-books { max-width: 560px; }
            }
            .img-placeholder {
                background-color: var(--color-bg-subtle);
                border-radius: 2px;
                display: flex;
                align-items: center;
                justify-content: center;
                color: var(--color-muted);
                font-size: 1em;
                font-family: var(--font-main);
                font-style: italic;
            }
            @media (max-width: 600px) {
                /* Less air between hero divider and first “##” heading */
                body:has(.advisory-md) .page-heading {
                    padding-bottom: 0.65rem;
                }
                main:has(.advisory-md) {
                    padding-top: 0.35rem;
                }
                .prose p,
                .advisory-md p {
                    line-height: 1.55;
                    margin-bottom: 1rem;
                }
                .section-heading,
                .advisory-md h2 {
                    margin-top: 1.1rem;
                    margin-bottom: 0.85rem;
                }
                main > .section-heading:first-child,
                .advisory-md h2:first-child {
                    margin-top: 0;
                }
                /* Book blurbs → rule line: was inline margin + 2rem on .section-rule */
                .advisory-citation-row {
                    gap: 1rem;
                    margin: 0.65rem 0 0.35rem;
                }
                .advisory-md .section-rule {
                    margin: 0.6rem auto;
                }
                /* “As climbers say …” — less vertical air on phones */
                .advisory-md p:has(+ blockquote) {
                    margin-bottom: 0.55rem;
                }
                .advisory-md blockquote {
                    margin: 0.45rem auto;
                }
                .advisory-md blockquote p {
                    margin-bottom: 0;
                }
            }
        </style>
    </head>
    <body>
        <header class="site-header">
  <p class="site-banner">Richard Rumelt</p>
        <nav class="nav-top" aria-label="Primary">
            <a href="about.html">About</a>
            <a href="index.html" class="active">Services</a>
            <a href="books.html">Portfolio</a>
        </nav>
        <nav class="nav-sub" aria-label="Services">
            <a href="index.html" class="active">Advisory</a>
            <a href="strategy-foundry.html" class="nav-strategy-foundry">Strategy Foundry</a>
            <a href="speaking.html">Speaking</a>
            <a href="contact.html">Contact</a>
        </nav>
        </header>
        <header class="page-heading">
            <h1>Rumelt Advisory Inc.</h1>
            <p class="tagline">Strategy is more than ambition. It is the focused application of strength against critical challenges.</p>
            <div class="divider"></div>
        </header>
        <main>
            <p id="advisory-md-status" style="padding: 0.5rem 0 2rem;">Loading…</p>
            <section id="advisory-md-root" class="advisory-md" hidden></section>
        </main>
        <footer>
            <p>© 2026 Richard Rumelt. All rights reserved.</p>
        </footer>
        <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
        <script src="js/markdown-page.js"></script>
        <script>
            RumeltMD.load({
                mdPath: 'content/advisory.md',
                root: '#advisory-md-root',
                status: '#advisory-md-status',
                heading: { title: '.page-heading h1', tagline: '.page-heading .tagline' }
            });
        </script>
    </body>
</html>
