<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Articles — Richard Rumelt</title>
  <meta name="description" content="Articles by Richard Rumelt on strategy, competition, and leadership, with curated writing from journals and publications." />
  <link rel="stylesheet" href="https://use.typekit.net/lhk6pvq.css" />
  <link rel="stylesheet" href="common.css" />
  <link rel="canonical" href="https://www.richardrumelt.com/articles.html" />
  <style>
    .page-heading { text-align: center; padding: 3rem 0 2.5rem; border-bottom: 1px solid var(--color-border); margin-bottom: 2.5rem; }
    .page-heading h1 { font-family: var(--font-main); font-size: 2.4rem; font-weight: 400; color: var(--color-navy); margin-bottom: 0.5rem; }
    .page-heading p { font-family: var(--font-main); font-size: 1em; color: var(--color-muted); font-style: italic; }
    .article-list { list-style: none; padding: 0; margin: 0; }
    .article-row { display: flex; align-items: baseline; gap: 0.9rem; padding: 0.75rem 0; border-bottom: 1px solid var(--color-border); }
    .article-row:last-child { border-bottom: none; }
    .article-view { font-family: var(--font-main); font-size: 0.88em; color: var(--color-accent); white-space: nowrap; flex-shrink: 0; min-width: 2.5rem; text-decoration: none; }
    .article-view:hover { text-decoration: underline; }
    .article-no-link { font-family: var(--font-main); font-size: 0.88em; color: var(--color-border); white-space: nowrap; flex-shrink: 0; min-width: 2.5rem; }
    .article-year { font-family: var(--font-main); font-size: 0.88em; color: var(--color-muted); white-space: nowrap; flex-shrink: 0; min-width: 2.8rem; }
    .article-body { flex: 1; }
    .article-title { font-family: var(--font-main); font-size: 1em; color: var(--color-navy); font-weight: 600; }
    .article-pub { font-family: var(--font-main); font-size: 0.88em; color: var(--color-muted); font-style: italic; margin-left: 0.5rem; }
    .article-desc { font-family: var(--font-main); font-size: 0.92em; color: var(--color-slate); margin-top: 0.25rem; line-height: 1.55; }
    #articles-loading { color: var(--color-muted); font-style: italic; padding: 2rem 0; }
  </style>
</head>
<body>
  <header class="site-header">
  <p class="site-banner">Richard P. Rumelt</p>
  <nav class="nav-top" aria-label="Primary">
    <a href="about.html">About</a>
    <a href="index.html">Services</a>
    <a href="books.html" class="active">Portfolio</a>
  </nav>
  <nav class="nav-sub" aria-label="Portfolio">
    <a href="books.html">Books</a>
    <a href="articles.html" class="active">Articles</a>
    <a href="substack.html">Substack</a>
    <a href="the-archive.html">The Archive</a>
  </nav>
  </header>

  <div class="page-heading">
    <h1>Articles</h1>
    <p>Practice-aimed writing by Richard Rumelt on strategy, competition, and organizational leadership.</p>
    <div class="divider"></div>
  </div>

  <main>
    <p id="articles-loading">Loading…</p>
    <ul class="article-list" id="article-list"></ul>
  </main>

  <footer><p>© 2026 Richard Rumelt. All rights reserved.</p></footer>

  <script src="js/markdown-page.js"></script>
  <script>
    function escapeHtmlAttr(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function documentViewerUrl(filePath, returnPage) {
      var q = new URLSearchParams();
      q.set('src', filePath);
      q.set('from', returnPage || 'articles.html');
      return 'view-pdf.html#' + q.toString();
    }

    /** If the order field is "x" or "X", the row is not listed. */
    function csvOrderSkipsItem(order) {
      return String(order == null ? '' : order).trim().toLowerCase() === 'x';
    }

    function parseCSV(text) {
      const lines = text.trim().split('\n');
      const headers = lines[0].split(',');
      return lines.slice(1).map(line => {
        const cols = [];
        let cur = '', inQ = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"' && !inQ) { inQ = true; }
          else if (ch === '"' && inQ && line[i+1] === '"') { cur += '"'; i++; }
          else if (ch === '"' && inQ) { inQ = false; }
          else if (ch === ',' && !inQ) { cols.push(cur); cur = ''; }
          else { cur += ch; }
        }
        cols.push(cur);
        const obj = {};
        headers.forEach((h, i) => obj[h.trim()] = (cols[i] || '').trim());
        return obj;
      });
    }

    fetch(RumeltMD.assetUrl('articles-data.csv'))
      .then(r => r.text())
      .then(text => {
        const articles = parseCSV(text).filter(function (a) {
          return !csvOrderSkipsItem(a.order);
        });
        articles.sort(function (a, b) {
          return Number(a.order) - Number(b.order);
        });
        const list = document.getElementById('article-list');
        document.getElementById('articles-loading').style.display = 'none';
        articles.forEach(a => {
          const li = document.createElement('li');
          li.className = 'article-row';
          const viewEl = a.file
            ? '<a class="article-view" href="' + escapeHtmlAttr(documentViewerUrl(a.file, 'articles.html')) + '">View</a>'
            : '<span class="article-no-link">—</span>';
          li.innerHTML = viewEl
            + '<span class="article-year">' + a.year + '</span>'
            + '<div class="article-body">'
            + '<span class="article-title">' + a.title + '</span>'
            + '<span class="article-pub">' + a.publication + '</span>'
            + (a.description ? '<div class="article-desc">' + a.description + '</div>' : '')
            + '</div>';
          list.appendChild(li);
        });
      })
      .catch(() => {
        document.getElementById('articles-loading').textContent = 'Could not load articles.';
      });
  </script>
</body>
</html>
