<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strategy Foundry™ — Richard Rumelt</title>
  <meta name="description" content="Strategy Foundry by Richard Rumelt helps leaders build strategic capability through focused learning, diagnosis, and practical strategy design." />
  <link rel="stylesheet" href="https://use.typekit.net/lhk6pvq.css">
  <link rel="stylesheet" href="common.css">
  <link rel="canonical" href="https://www.richardrumelt.com/strategy-foundry.html" />
  <style>
    .sf-hero-video-wrap {
      max-width: 1100px;
      margin: 0 auto 1.75rem;
      border-radius: 6px;
      overflow: hidden;
      background: var(--color-bg-subtle);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }
    .sf-hero-video-wrap {
      position: relative;
    }
    .sf-hero-video-wrap video {
      width: 100%;
      display: block;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      cursor: pointer;
    }
    .sf-play-btn {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.25);
      cursor: pointer;
      transition: background 0.2s;
    }
    .sf-play-btn:hover { background: rgba(0,0,0,0.38); }
    .sf-play-btn svg {
      width: 72px; height: 72px;
      fill: rgba(255,255,255,0.92);
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
    }
    .sf-play-btn.hidden { display: none; }
    @media (prefers-reduced-motion: reduce) {
      .sf-hero-video-wrap video {
        display: none;
      }
      .sf-hero-video-wrap::after {
        content: "Video disabled when “reduce motion” is on.";
        display: block;
        padding: 2rem;
        text-align: center;
        font-family: var(--font-main);
        font-size: 0.95em;
        color: var(--color-muted);
      }
    }
    .page-heading { padding-bottom: 2.5rem; }
    .sf-blurbs {
      margin-top: 2.5rem;
    }
    .sf-blurbs-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 100%;
    }
    .sf-blurb-card { padding: 0.5rem 0; background: none; border: none; border-radius: 0; border-top: 1px solid var(--color-border); }
    .sf-blurb-quote {
      font-family: var(--font-main);
      font-size: 0.88em;
      font-style: italic;
      color: var(--color-slate);
      line-height: 1.65;
      margin-bottom: 0.75rem;
    }
    .sf-blurb-attr {
      font-family: var(--font-main);
      font-size: 0.88em;
      color: var(--color-muted);
      line-height: 1.4;
    }
    .sf-blurb-attr strong {
      color: var(--color-accent);
      font-style: italic;
      font-weight: 400;
    }
    .sf-blurb-card--note .sf-blurb-quote {
      font-style: normal;
    }
    .sf-blurb-quote a {
      color: var(--color-accent);
      text-decoration: underline;
    }
    .sf-blurb-quote a:hover {
      color: var(--color-navy);
    }
  </style>
</head>
<body>
  <header class="site-header">
  <p class="site-banner">Richard Rumelt</p>
  <nav class="nav-top" aria-label="Primary">
    <a href="about.html">About</a>
    <a href="index.html" class="active">Services</a>
    <a href="books.html">Portfolio</a>
  </nav>
  <nav class="nav-sub" aria-label="Services">
    <a href="index.html">Advisory</a>
    <a href="strategy-foundry.html" class="active nav-strategy-foundry">Strategy Foundry</a>
    <a href="speaking.html">Speaking</a>
    <a href="contact.html">Contact</a>
  </nav>
  </header>
  <main>
    <div class="sf-hero-video-wrap">
      <video
        id="sf-hero-video"
        class="sf-hero-video"
        playsinline
        preload="auto"
        aria-label="Strategy Foundry preview"
      >
        <source src="videos/forge.mp4" type="video/mp4" />
      </video>
      <div class="sf-play-btn hidden" id="sf-play-btn" aria-label="Play video">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
    </div>
    <div class="page-heading">
      <h1>Strategy Foundry™</h1>
      <p>Building strategic capabilities through focused learning.</p>
      <div class="divider"></div>
    </div>
    <p id="sf-md-status" style="color: var(--color-muted); font-style: italic;">Loading…</p>
    <div id="sf-md-root" hidden></div>
  </main>
  <footer><p>© 2026 Richard Rumelt. All rights reserved.</p></footer>
  <script>
    (function () {
      const video = document.getElementById('sf-hero-video');
      const btn   = document.getElementById('sf-play-btn');

      function showBtn() { btn.classList.remove('hidden'); }
      function hideBtn() { btn.classList.add('hidden'); }

      function replay() {
        video.currentTime = 0;
        video.play().then(hideBtn).catch(showBtn);
      }

      // Autoplay with audio on load
      video.play().then(hideBtn).catch(showBtn);

      // Stop at last frame — don't loop
      video.addEventListener('ended', showBtn);

      // Click video or overlay button to replay
      video.addEventListener('click', replay);
      btn.addEventListener('click', replay);
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="js/markdown-page.js"></script>
  <script>
    RumeltMD.load({
      mdPath: 'content/strategy-foundry.md',
      root: '#sf-md-root',
      status: '#sf-md-status',
      heading: { title: '.page-heading h1', tagline: '.page-heading > p' }
    });
  </script>
</body>
</html>
